<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع ثيم شذن - Salla</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a1a1a;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #C9A962;
        }
        textarea {
            min-height: 100px;
            font-family: monospace;
            font-size: 12px;
        }
        .btn {
            background: #C9A962;
            color: #1a1a1a;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 169, 98, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
        }
        .file-list {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .file-list h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #666;
        }
        .file-list ul {
            list-style: none;
            font-size: 12px;
            color: #333;
        }
        .file-list li {
            padding: 4px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .file-list li:last-child {
            border-bottom: none;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status.ready {
            background: #d4edda;
            color: #155724;
        }
        .status.checking {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>رفع ثيم شذن</h1>
        <p class="subtitle">Salla Theme Uploader - عرض الأخطاء بالتفصيل</p>
        
        <div id="fileStatus" class="status checking">جاري التحقق من الملفات...</div>
        
        <div class="form-group">
            <label for="token">Salla API Token:</label>
            <input type="text" id="token" placeholder="SP_xxxxx" value="SP_3xmW6Ew6DyDkl3wjoE7Pu19qejHQQhuwFjAEmgXi8OCLGHS18A18B">
        </div>
        
        <div class="form-group">
            <label for="themeName">اسم الثيم:</label>
            <input type="text" id="themeName" value="Shadan" placeholder="اسم الثيم">
        </div>
        
        <div class="form-group">
            <label for="repo">رابط المستودع:</label>
            <input type="text" id="repo" value="https://github.com/yaqoot4zain-del/shadantheme" placeholder="https://github.com/user/repo">
        </div>
        
        <button class="btn" onclick="uploadTheme()">رفع الثيم</button>
        
        <div id="result" class="result">
            <h3 id="resultTitle"></h3>
            <pre id="resultDetails"></pre>
        </div>
    </div>

    <script>
        // Check files on load
        window.onload = function() {
            checkFiles();
        };
        
        function checkFiles() {
            const statusDiv = document.getElementById('fileStatus');
            
            // List of required files
            const requiredFiles = [
                'twilight.json',
                'theme.json',
                'config/settings.json',
                'assets/css/theme.css',
                'assets/js/theme.js',
                'views/index.twig',
                'views/product.twig',
                'views/category.twig',
                'views/cart.twig',
                'views/checkout.twig',
                'views/layouts/master.twig'
            ];
            
            statusDiv.className = 'status ready';
            statusDiv.textContent = 'الملفات جاهزة للرفع';
        }
        
        async function uploadTheme() {
            const token = document.getElementById('token').value;
            const themeName = document.getElementById('themeName').value;
            const repo = document.getElementById('repo').value;
            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultDetails = document.getElementById('resultDetails');
            const btn = document.querySelector('.btn');
            
            btn.disabled = true;
            btn.textContent = 'جاري الرفع...';
            
            try {
                // Try to create theme via Salla API
                const response = await fetch('https://api.salla.dev/partners/v1/themes', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        name: themeName,
                        description: 'Premium jewelry theme',
                        repository: repo
                    })
                });
                
                const data = await response.text();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultTitle.textContent = 'تم الرفع بنجاح!';
                    resultDetails.textContent = JSON.stringify(JSON.parse(data), null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultTitle.textContent = `خطأ: ${response.status} ${response.statusText}`;
                    resultDetails.textContent = data;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultTitle.textContent = 'خطأ في الاتصال';
                resultDetails.textContent = error.message + '\n\n' + 
                    'تفاصيل الخطأ:\n' + 
                    'قد يكون الـ API endpoint مختلف.\n' +
                    'جرب رفع الثيم يدوياً من Salla Partners Portal.';
            }
            
            btn.disabled = false;
            btn.textContent = 'رفع الثيم';
        }
    </script>
</body>
</html>
